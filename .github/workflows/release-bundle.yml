name: Release Bundle

on:
  push:
    tags:
      - "v*"
      - "!v*-*" # Exclude tags with hyphens (wl-v*, md-v*)

jobs:
  bundle:
    name: Create Bundle Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Creating bundle $TAG"

      - name: Parse bundle version
        id: versions
        run: |
          # Read bundle versions from commit message or tag annotation
          # For now, use latest releases of each tool
          # Note: gh release list is tab-separated, use -F'\t' to parse correctly
          # Column 3 is the tag (e.g., wl-v0.4.4)
          WL_VERSION=$(gh release list -R dohzya/tools | awk -F'\t' '$3 ~ /^wl-v/ {print $3; exit}' | sed 's/^wl-v//')
          MD_VERSION=$(gh release list -R dohzya/tools | awk -F'\t' '$3 ~ /^md-v/ {print $3; exit}' | sed 's/^md-v//')
          RECAP_VERSION=$(gh release list -R dohzya/tools | awk -F'\t' '$3 ~ /^recap-v/ {print $3; exit}' | sed 's/^recap-v//')
          DZ_REVIEW_VERSION=$(gh release list -R dohzya/tools | awk -F'\t' '$3 ~ /^dz-review-v/ {print $3; exit}' | sed 's/^dz-review-v//')

          echo "wl_version=$WL_VERSION" >> $GITHUB_OUTPUT
          echo "md_version=$MD_VERSION" >> $GITHUB_OUTPUT
          echo "recap_version=$RECAP_VERSION" >> $GITHUB_OUTPUT
          echo "dz_review_version=$DZ_REVIEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bundle will contain: wl-$WL_VERSION + md-$MD_VERSION + recap-$RECAP_VERSION + dz-review-$DZ_REVIEW_VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download binaries
        run: |
          mkdir -p dist

          WL_VERSION=${{ steps.versions.outputs.wl_version }}
          MD_VERSION=${{ steps.versions.outputs.md_version }}
          RECAP_VERSION=${{ steps.versions.outputs.recap_version }}
          DZ_REVIEW_VERSION=${{ steps.versions.outputs.dz_review_version }}

          download_tool() {
            local tool="$1"
            local version="$2"

            for platform in darwin-arm64 darwin-x86_64 linux-arm64 linux-x86_64 windows-x86_64; do
              ext=""
              if [[ "$platform" == windows-* ]]; then
                ext=".exe"
              fi

              echo "Downloading ${tool}-${platform}${ext}..."
              gh release download "${tool}-v${version}" \
                -p "${tool}-${platform}${ext}" \
                -D dist \
                -R dohzya/tools
            done
          }

          download_tool wl "$WL_VERSION"
          download_tool md "$MD_VERSION"
          download_tool recap "$RECAP_VERSION"
          download_tool dz-review "$DZ_REVIEW_VERSION"

          ls -lh dist/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Bundle ${{ steps.tag.outputs.tag }}
          body: |
            # Tools Bundle ${{ steps.tag.outputs.version }}

            This bundle release contains:
            - **wl** `${{ steps.versions.outputs.wl_version }}` - Worklog tool
            - **md** `${{ steps.versions.outputs.md_version }}` - Markdown-surgeon tool
            - **recap** `${{ steps.versions.outputs.recap_version }}` - Project context snapshot tool
            - **dz-review** `${{ steps.versions.outputs.dz_review_version }}` - Markdown review syntax helper

            ## Installation

            ### mise
            ```bash
            mise use https://github.com/dohzya/mise-tools@${{ steps.tag.outputs.tag }}
            ```

            ### homebrew (individual tools)
            ```bash
            brew install dohzya/tools/wl
            brew install dohzya/tools/md
            brew install dohzya/tools/recap
            brew install dohzya/tools/dz-review
            ```
          draft: false
          prerelease: false
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
